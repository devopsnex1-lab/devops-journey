<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Journey</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            max-width: 400px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
        }

        .badge {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 999px;
            background: #22c55e;
            color: #022c22;
            font-weight: bold;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 DevOps Journey</h1>
        <p>I just deployed my first Docker container with Nginx!</p>
        
        <div class="badge">Docker + Nginx ✅</div>

        <div class="footer">
            Powered by Docker | Built by You 😏
        </div>
    </div>
</body>
</html>
