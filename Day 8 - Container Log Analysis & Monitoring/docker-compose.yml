version: '3.8'

services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    image: alpine
    command: >
      sh -c "while true; do echo 'INFO: App is running'; sleep 5; done"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
